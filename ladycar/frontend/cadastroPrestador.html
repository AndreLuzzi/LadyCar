<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Cadastro Prestador</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h2>Cadastro de Prestador de Serviço</h2>
    <form id="cadastroPrestadorForm">
      <input type="text" id="nome" placeholder="Nome" required />
      <input type="text" id="cpf" placeholder="CPF" required />
      <input type="text" id="telefone" placeholder="Telefone" />
      <input type="email" id="email" placeholder="E-mail" required />
      <input type="password" id="senha" placeholder="Senha" required />
      <select id="categoria" required>
        <option value="">Selecione a categoria</option>
        <option>Mecânico</option>
        <option>Eletricista</option>
        <option>Borracheiro</option>
        <option>Guincho</option>
        <option>Funilaria</option>
        <option>Pintura</option>
        <option>Troca de Óleo</option>
        <option>Lavagem</option>
      </select>
      <textarea id="descricao" placeholder="Descrição / Especialidades"></textarea>
      <input type="text" id="cidade" placeholder="Cidade" />
      <input type="text" id="estado" placeholder="Estado" />

      <button type="submit" class="btn-primary full-width">Cadastrar</button>
    </form>
    <p>Já tem conta? <a href="loginPrestador.html">Entrar</a></p>
  </div>
  <script src="js/prestador.js"></script>
</body>
</html>
