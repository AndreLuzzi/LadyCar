<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Login Prestador</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h2>Login Prestador</h2>
    <form id="loginPrestadorForm">
      <input type="email" id="emailPrestador" placeholder="E-mail" required />
      <input type="password" id="senhaPrestadorLogin" placeholder="Senha" required />
      <button type="submit" class="btn-primary full-width">Entrar</button>
    </form>
    <p>Não tem conta? <a href="cadastroPrestador.html">Cadastre-se</a></p>
  </div>
  <script src="js/prestador.js"></script>
</body>
</html>
